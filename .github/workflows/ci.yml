name: Reproducibility Audit CI

on:
  push:

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml scikit-learn groq

      - name: Run full Git-native pipeline
        run: python scripts/run_agent.py

      - name: Upload report artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-report
          path: memory/report.md
          if-no-files-found: ignore
