name: Reproducibility Audit CI

on:
  push:

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml scikit-learn

      - name: Reproduce experiment
        run: python scripts/run_experiment.py

      - name: Detect divergence
        id: detect
        run: |
          python scripts/compare_results.py
          DIVERGENCE=$(python - <<'PY'
import yaml
from pathlib import Path
p = Path('experiments/comparison.yaml')
with p.open('r', encoding='utf-8') as f:
    c = yaml.safe_load(f)
print(str(bool(c.get('divergence', False))).lower())
PY
)
          echo "divergence=$DIVERGENCE" >> "$GITHUB_OUTPUT"

      - name: Simulate bisect failure analysis
        if: steps.detect.outputs.divergence == 'true'
        run: python scripts/bisect_simulation.py

      - name: Blame root cause
        if: steps.detect.outputs.divergence == 'true'
        run: python scripts/blame_analysis.py

      - name: Generate report
        if: steps.detect.outputs.divergence == 'true'
        run: python scripts/generate_report.py

      - name: Simulate replication PR
        if: steps.detect.outputs.divergence == 'true'
        run: python scripts/create_pr.py
